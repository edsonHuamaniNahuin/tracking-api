<VirtualHost *:80>
    ServerName api.nautic.run
    DocumentRoot /var/www/tracking-api/public

    <Directory /var/www/tracking-api/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        # Laravel front controller
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    # PHP-FPM (TCP — coincide con listen = 127.0.0.1:9000 en www.conf)
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    # ── Reverb WebSocket ────────────────────────────────────────────────────
    # Requiere: a2enmod proxy proxy_http proxy_wstunnel
    # El cliente conecta a wss://api.nautic.run/app/{key}
    # Apache lo upgradea a WebSocket y lo reenvía a Reverb (localhost:8081)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/app(.*)$ ws://127.0.0.1:8081/app$1 [P,L]

    ProxyPass        /app  ws://127.0.0.1:8081/app
    ProxyPassReverse /app  ws://127.0.0.1:8081/app

    # Seguridad
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/tracking-api-error.log
    CustomLog ${APACHE_LOG_DIR}/tracking-api-access.log combined
</VirtualHost>

# NOTA: Certbot agregará automáticamente el bloque SSL (443)
# después de ejecutar: certbot --apache -d api.nautic.run
