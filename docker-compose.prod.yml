version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracking-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - tracking-net

networks:
  tracking-net:
    driver: bridge

volumes:
  app-storage:
    driver: local
