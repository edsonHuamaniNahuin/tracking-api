worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    sendfile       on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Directorios temporales en /tmp (sin necesidad de root)
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    server {
        listen 8080;
        server_name _;

        root  /var/www/html/public;
        index index.php;

        # SPA / Laravel front controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass           127.0.0.1:9000;
            fastcgi_index          index.php;
            fastcgi_param          SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include                fastcgi_params;
            fastcgi_read_timeout   300;
        }

        # Reverb WebSocket — Pusher/Echo conecta a wss://api.nautic.run/app/{key}
        # nginx upgradea la conexión HTTP→WebSocket y la reenvía a Reverb (puerto interno 8081)
        location /app {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 60s;
        }

        # Denegar acceso a .htaccess
        location ~ /\.ht {
            deny all;
        }
    }
}
